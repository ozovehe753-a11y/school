<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University of Technology – UMS Phase 3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body,html{font-family:'Inter',sans-serif;font-size:14px;background:#F1F5F9;color:#1E293B;min-height:100vh}
:root{
  --navy:#0A1628;--navy2:#112240;
  --gold:#F5A623;--gold-bg:#FFF8EC;--gold-dk:#C47D0E;
  --green:#10B981;--danger:#EF4444;--info:#3B82F6;--warn:#F59E0B;
  --card:#fff;--bd:#E2E8F0;--txt:#1E293B;--muted:#64748B;--bg:#F1F5F9;
  --r:8px;--r2:12px;
}

/* TOP NAV */
.topnav{background:var(--navy);height:48px;display:flex;align-items:center;padding:0 22px;gap:8px;position:sticky;top:0;z-index:200;border-bottom:1px solid rgba(255,255,255,.08)}
.tnav-logo{color:#fff;font-size:13px;font-weight:600;margin-right:12px;display:flex;align-items:center;gap:8px}
.tnav-logo i{color:var(--gold);font-size:18px}
.tnav-btn{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);background:transparent;transition:.12s;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px}
.tnav-btn:hover{background:rgba(255,255,255,.09);color:#fff}
.tnav-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:700}
.tnav-sep{flex:1}
.tnav-user{font-size:11px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:6px}

/* SHELL */
.shell{display:flex;min-height:calc(100vh - 48px)}

/* SIDEBAR */
.sidebar{width:225px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;min-height:calc(100vh - 48px)}
.sb-logo{padding:16px 16px 13px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.sb-logo-box{width:28px;height:28px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center}
.sb-logo-box i{font-size:14px;color:var(--navy)}
.sb-logo-text{color:#fff;font-size:12px;font-weight:600;line-height:1.3}
.sb-logo-text span{display:block;color:rgba(255,255,255,.35);font-weight:400;font-size:10px;letter-spacing:.3px}
.sb-user{padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-user-chip{display:flex;align-items:center;gap:9px}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--navy);flex-shrink:0}
.sb-name{color:#fff;font-size:12px;font-weight:500}
.sb-role{font-size:9px;color:var(--gold);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.sb-role-badge{background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);color:var(--gold);font-size:9px;padding:2px 7px;border-radius:10px;margin-top:3px;display:inline-block}
.sb-nav{padding:11px 9px;flex:1;overflow-y:auto}
.sb-section{margin-bottom:16px}
.sb-section-label{font-size:8px;font-weight:700;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.8px;padding:0 7px;margin-bottom:5px}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:7px;cursor:pointer;transition:.12s;color:rgba(255,255,255,.5);font-size:12px;font-weight:400;position:relative}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.active{background:rgba(245,166,35,.14);color:var(--gold);font-weight:500}
.sb-item i{font-size:14px;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:8px;font-weight:700;padding:2px 5px;border-radius:10px}
.sb-lock{margin-left:auto;font-size:11px;color:rgba(255,255,255,.2)}
.sb-foot{padding:13px 16px;border-top:1px solid rgba(255,255,255,.08)}
.sb-logout{display:flex;align-items:center;gap:7px;color:rgba(255,255,255,.3);font-size:12px;cursor:pointer;transition:.12s}
.sb-logout:hover{color:var(--danger)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--card);border-bottom:1px solid var(--bd);padding:0 24px;height:54px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:var(--txt);flex:1}
.topbar-search{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:7px 11px;width:210px}
.topbar-search input{border:none;background:none;font-size:12px;color:var(--txt);outline:none;width:100%;font-family:'Inter',sans-serif}
.topbar-search i{font-size:13px;color:var(--muted);flex-shrink:0}
.topbar-btn{width:34px;height:34px;border:1px solid var(--bd);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--card);transition:.12s;position:relative}
.topbar-btn:hover{background:var(--bg)}
.topbar-btn i{font-size:15px;color:var(--muted)}
.notif-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--danger);border-radius:50%;border:1.5px solid var(--card)}
.sem-tag{background:var(--gold-bg);color:var(--gold-dk);font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;border:1px solid rgba(245,166,35,.28);white-space:nowrap}
.content{flex:1;overflow-y:auto;padding:24px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;margin-bottom:14px}
.card-head{padding:13px 17px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:600;color:var(--txt)}
.card-body{padding:17px}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}

/* STAT CARDS */
.stat{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.stat.blue::before{background:var(--info)}.stat.green::before{background:var(--green)}
.stat.gold::before{background:var(--gold)}.stat.purple::before{background:#8B5CF6}.stat.red::before{background:var(--danger)}
.stat-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:11px}
.stat-icon i{font-size:17px}
.stat.blue .stat-icon{background:#DBEAFE;color:var(--info)}.stat.green .stat-icon{background:#D1FAE5;color:var(--green)}
.stat.gold .stat-icon{background:var(--gold-bg);color:var(--gold-dk)}.stat.purple .stat-icon{background:#EDE9FE;color:#8B5CF6}
.stat.red .stat-icon{background:#FEE2E2;color:var(--danger)}
.stat-val{font-size:22px;font-weight:700;color:var(--txt);margin-bottom:2px}
.stat-label{font-size:12px;color:var(--muted)}
.stat-sub{font-size:11px;margin-top:5px;font-weight:600}
.sub-up{color:var(--green)}.sub-down{color:var(--danger)}.sub-warn{color:var(--warn)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px}
.badge i{font-size:10px}
.badge-success{background:#D1FAE5;color:#065F46}
.badge-warning{background:#FEF3C7;color:#92400E}
.badge-info{background:#DBEAFE;color:#1E40AF}
.badge-muted{background:var(--bg);color:var(--muted);border:1px solid var(--bd)}
.badge-danger{background:#FEE2E2;color:#991B1B}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.12s;display:inline-flex;align-items:center;gap:6px;font-family:'Inter',sans-serif}
.btn i{font-size:13px}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy2)}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:var(--gold-dk)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-danger-sm{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5;padding:5px 10px;font-size:11px;border-radius:var(--r);cursor:pointer;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:4px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* FORM FIELDS */
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;color:var(--txt);background:var(--card);outline:none;font-family:'Inter',sans-serif;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(10,22,40,.07)}
.field textarea{resize:vertical;min-height:70px}
.field input[readonly]{background:var(--bg)}

/* PASSPORT UPLOAD */
.passport-zone{width:120px;height:150px;border:1.5px dashed var(--bd);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.15s;background:var(--bg);flex-shrink:0}
.passport-zone:hover{border-color:var(--navy);background:#EEF2F7}
.passport-zone.uploaded{border-color:var(--green);background:#F0FDF4}
.passport-zone i.pz-icon{font-size:28px;color:var(--muted);margin-bottom:6px}
.passport-zone.uploaded i.pz-icon{color:var(--green)}
.pz-label{font-size:10px;color:var(--muted);text-align:center;line-height:1.4;padding:0 8px}
.passport-zone.uploaded .pz-label{color:#065F46}

/* PROFILE BANNER */
.profile-banner{background:var(--navy);border-radius:var(--r2);padding:20px;color:#fff;margin-bottom:16px;display:flex;gap:18px;align-items:center}
.pb-photo{width:80px;height:100px;border-radius:8px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:var(--navy);flex-shrink:0;overflow:hidden}
.pb-info{flex:1}
.pb-name{font-size:19px;font-weight:700;margin-bottom:3px}
.pb-matric{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:10px}
.pb-tags{display:flex;flex-wrap:wrap;gap:5px}
.pb-tag{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);font-size:10px;padding:3px 9px;border-radius:5px}
.pb-tag.gold{background:rgba(245,166,35,.2);color:var(--gold)}

/* TABLES */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:10px 14px;border-bottom:1px solid var(--bd);text-align:left;background:var(--bg)}
.tbl td{font-size:12px;padding:11px 14px;border-bottom:1px solid var(--bd);color:var(--txt)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#FAFBFC}
.u-cell{display:flex;align-items:center;gap:9px}
.u-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.u-name{font-weight:600;font-size:12px}.u-email{font-size:10px;color:var(--muted)}
.act-row{display:flex;gap:4px}
.act-btn{width:27px;height:27px;border:1px solid var(--bd);border-radius:6px;background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.1s}
.act-btn:hover{background:var(--bg)}
.act-btn i{font-size:12px;color:var(--muted)}

/* COURSE CARDS */
.course-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.course-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);padding:13px;position:relative;overflow:hidden}
.course-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.course-card.c1::after{background:#3B82F6}.course-card.c2::after{background:#8B5CF6}
.course-card.c3::after{background:var(--green)}.course-card.c4::after{background:var(--gold)}
.course-card.c5::after{background:var(--danger)}.course-card.c6::after{background:#EC4899}
.course-code{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}
.course-name{font-size:12px;font-weight:600;color:var(--txt);margin-bottom:8px;line-height:1.35}
.course-meta{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--muted)}

/* GPA RING */
.gpa-wrap{display:flex;align-items:center;gap:18px;padding:16px}
.gpa-ring{width:80px;height:80px;border-radius:50%;background:conic-gradient(var(--green) 0% 87%, var(--bg) 87%);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.gpa-ring::after{content:'';position:absolute;width:56px;height:56px;border-radius:50%;background:var(--card)}
.gpa-val{position:relative;z-index:1;font-size:17px;font-weight:700;color:var(--txt)}
.gpa-info{flex:1}
.gpa-label{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:4px}
.gpa-sub{font-size:11px;color:var(--muted)}
.prog-bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:3px}

/* RESULT TABLE */
.result-tbl{width:100%;border-collapse:collapse}
.result-tbl th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;padding:9px 13px;border-bottom:1px solid var(--bd);text-align:left;background:var(--bg)}
.result-tbl td{font-size:12px;padding:10px 13px;border-bottom:1px solid var(--bd);color:var(--txt)}
.result-tbl tr:last-child td{border-bottom:none}
.grade-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.grade-A{background:#D1FAE5;color:#065F46}.grade-B{background:#DBEAFE;color:#1E40AF}
.grade-C{background:#FEF3C7;color:#92400E}.grade-F{background:#FEE2E2;color:#991B1B}

/* TIMELINE */
.timeline{list-style:none}
.tl-item{display:flex;gap:12px;align-items:flex-start;padding-bottom:14px;position:relative}
.tl-item::after{content:'';position:absolute;left:11px;top:25px;width:1px;bottom:0;background:var(--bd)}
.tl-item:last-child::after{display:none}
.tl-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1}
.tl-dot i{font-size:11px;color:#fff}
.tl-title{font-size:12px;font-weight:600;color:var(--txt);margin-bottom:1px;padding-top:3px}
.tl-sub{font-size:11px;color:var(--muted)}

/* ACCESS DENIED */
.access-denied{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:var(--r2);padding:32px;text-align:center;max-width:480px;margin:0 auto}
.access-denied i{font-size:36px;color:var(--danger);margin-bottom:12px;display:block}
.access-denied h3{font-size:16px;font-weight:700;color:#991B1B;margin-bottom:6px}
.access-denied p{font-size:13px;color:#B91C1C;line-height:1.6}

/* REGISTER */
.reg-wrap{max-width:580px;margin:0 auto}
.reg-hero{background:var(--navy);border-radius:var(--r2);padding:22px;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.reg-hero i{font-size:32px;color:var(--gold);flex-shrink:0}
.reg-hero h2{font-size:17px;font-weight:700;margin-bottom:3px}
.reg-hero p{font-size:12px;color:rgba(255,255,255,.5)}

/* SECTION DIVIDER */
.section-div{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 11px;padding-bottom:6px;border-bottom:1px solid var(--bd)}

/* PAGER */
.pager{display:flex;gap:5px}
.pager-btn{padding:5px 12px;border:1px solid var(--bd);border-radius:6px;background:var(--card);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif}
.pager-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* NOTICE BANNER */
.notice{padding:11px 14px;border-radius:var(--r2);font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.notice i{font-size:15px;flex-shrink:0}
.notice-gold{background:var(--gold-bg);border:1px solid rgba(245,166,35,.3);color:var(--gold-dk)}
.notice-warn{background:#FEF3C7;border:1px solid #FDE68A;color:#92400E}
.notice-danger{background:#FEF2F2;border:1px solid #FCA5A5;color:#991B1B}
.notice-info{background:#DBEAFE;border:1px solid #BFDBFE;color:#1E40AF}

/* ROLES GRID */
.roles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.role-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);padding:16px}
.role-card.featured{border:2px solid var(--gold)}
.role-card-head{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.role-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.role-perms{font-size:11px;color:var(--muted);line-height:2}

/* SETTINGS */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg);border-radius:var(--r);margin-bottom:7px}
.setting-row span{font-size:12px;color:var(--txt)}
</style>
</head>
<body>

<div class="topnav">
  <div class="tnav-logo"><i class="ti ti-building"></i>University of Technology UMS</div>
  <button class="tnav-btn active" id="btn-student" onclick="switchPortal('student',this)"><i class="ti ti-user-graduate"></i>Student portal</button>
  <button class="tnav-btn" id="btn-admin" onclick="switchPortal('admin',this)"><i class="ti ti-shield-check"></i>Admin portal</button>
  <div class="tnav-sep"></div>
  <div class="tnav-user"><i class="ti ti-user-circle"></i><span id="nav-user-txt">Chidi Okonkwo — Student</span></div>
</div>

<div class="shell">
  <div class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-box"><i class="ti ti-building"></i></div>
      <div class="sb-logo-text">U-Tech UMS<span id="sb-portal-label">Student portal</span></div>
    </div>
    <div class="sb-user">
      <div class="sb-user-chip">
        <div class="sb-avatar" id="sb-av">CO</div>
        <div>
          <div class="sb-name" id="sb-name">Chidi Okonkwo</div>
          <div class="sb-role" id="sb-role">Student</div>
          <div class="sb-role-badge" id="sb-role-badge">CSE/2022/114</div>
        </div>
      </div>
    </div>
    <div class="sb-nav" id="sb-nav"></div>
    <div class="sb-foot">
      <div class="sb-logout"><i class="ti ti-logout"></i>Sign out</div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Student dashboard</div>
      <div class="topbar-search"><i class="ti ti-search"></i><input placeholder="Search courses, results, services..."></div>
      <span class="sem-tag">2024/2025 · Semester 1</span>
      <div class="topbar-btn"><i class="ti ti-bell"></i><div class="notif-dot"></div></div>
      <div class="topbar-btn"><i class="ti ti-user"></i></div>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<script>
const STUDENT_NAV=[
  {section:'My portal',items:[
    {id:'dashboard',icon:'ti-layout-dashboard',label:'Dashboard'},
    {id:'profile',icon:'ti-user',label:'My profile'},
    {id:'register',icon:'ti-user-plus',label:'Register account'},
  ]},
  {section:'Academics',items:[
    {id:'courses',icon:'ti-book',label:'My courses'},
    {id:'results',icon:'ti-chart-bar',label:'Results & GPA'},
    {id:'timetable',icon:'ti-calendar',label:'Timetable'},
  ]},
  {section:'Services',items:[
    {id:'payments',icon:'ti-credit-card',label:'Payments'},
    {id:'library',icon:'ti-books',label:'Library'},
  ]},
  {section:'Admin (restricted)',items:[
    {id:'admin_block',icon:'ti-users',label:'User management',locked:true},
    {id:'admin_block',icon:'ti-settings',label:'System settings',locked:true},
    {id:'admin_block',icon:'ti-report-analytics',label:'Analytics',locked:true},
  ]},
];

const ADMIN_NAV=[
  {section:'Overview',items:[
    {id:'admin_dashboard',icon:'ti-layout-dashboard',label:'Dashboard'},
    {id:'admin_users',icon:'ti-users',label:'User management'},
    {id:'admin_roles',icon:'ti-shield-check',label:'Roles & permissions'},
  ]},

let currentPortal='student';

function buildNav(navData){
  const container=document.getElementById('sb-nav');
  container.innerHTML='';
  navData.forEach(section=>{
    const secDiv=document.createElement('div');
    secDiv.className='sb-section';
    const label=document.createElement('div');
    label.className='sb-section-label';
    label.textContent=section.section;
    secDiv.appendChild(label);
    section.items.forEach(item=>{
      const el=document.createElement('div');
      el.className='sb-item';
      el.innerHTML=`<i class="ti ${item.icon}"></i>${item.label}${item.locked?'<span class="sb-lock"><i class="ti ti-lock"></i></span>':''}`;
      el.onclick=()=>{
        if(item.locked){showPanel('admin_block');setActiveNav(el);return}
        setActiveNav(el);
        showPanel(item.id);
      };
      secDiv.appendChild(el);
    });
    container.appendChild(secDiv);
  });
  // activate first non-locked item
  const first=container.querySelector('.sb-item:not([data-locked])');
  if(first)first.classList.add('active');
}

function setActiveNav(el){
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
}

function switchPortal(portal,btn){
  currentPortal=portal;
  document.querySelectorAll('.tnav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(portal==='student'){
    document.getElementById('sb-av').textContent='CO';
    document.getElementById('sb-name').textContent='Chidi Okonkwo';
    document.getElementById('sb-role').textContent='Student';
    document.getElementById('sb-role-badge').textContent='CSE/2022/114';
    document.getElementById('sb-portal-label').textContent='Student portal';
    document.getElementById('nav-user-txt').textContent='Chidi Okonkwo — Student';
    buildNav(STUDENT_NAV);
    showPanel('dashboard');
  } else {
    document.getElementById('sb-av').textContent='JA';
    document.getElementById('sb-name').textContent='Dr. J. Adeyemi';
    document.getElementById('sb-role').textContent='Super Admin';
    document.getElementById('sb-role-badge').textContent='Administrator';
    document.getElementById('sb-portal-label').textContent='Admin portal';
    document.getElementById('nav-user-txt').textContent='Dr. J. Adeyemi — Super Admin';
    buildNav(ADMIN_NAV);
    showPanel('admin_dashboard');
  }
}

function showPanel(id){
  const content=document.getElementById('main-content');
  const fn=PANELS[id];
  content.innerHTML=fn?fn():`<div style="padding:20px;color:var(--muted)">Panel coming soon.</div>`;
  const titles={
    dashboard:'Student dashboard',profile:'My profile',register:'Register account',
    courses:'My courses',results:'Results & GPA',timetable:'Lecture timetable',
    payments:'Payments',library:'Library',admin_block:'Access denied',
    admin_dashboard:'Admin dashboard',admin_users:'User management',
    admin_roles:'Roles & permissions',admin_admissions:'Admissions',
    admin_courses:'Course management',admin_results:'Results approval',
    admin_finance:'Finance',admin_hostel:'Hostel management',
    admin_reports:'Reports',admin_settings:'System settings',admin_logs:'Audit logs',
  };
  document.getElementById('topbar-title').textContent=titles[id]||'Dashboard';
}
